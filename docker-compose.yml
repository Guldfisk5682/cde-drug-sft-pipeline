services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      HF_HOME: /workspace/.cache/huggingface
      TRANSFORMERS_CACHE: /workspace/.cache/huggingface/transformers
      TORCH_HOME: /workspace/.cache/torch
    gpus: all
    tty: true
    stdin_open: true
    command: bash
