base_model: Qwen/Qwen3.5-4B
training_method: dora
enable_thinking: false
load_in_4bit: false
load_in_8bit: true
bnb_4bit_quant_type: nf4
bnb_4bit_use_double_quant: true
torch_dtype: float16
device_map: cuda:0
train_dataset_path: data/dataset/train.jsonl
eval_dataset_path: null
output_dir: outputs/qwen3.5-4b-dora
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
per_device_train_batch_size: 1
per_device_eval_batch_size: 2
gradient_accumulation_steps: 8
eval_accumulation_steps: 4
learning_rate: 2.0e-4
num_train_epochs: 2
warmup_ratio: 0.03
weight_decay: 0.01
lr_scheduler_type: cosine
optim: paged_adamw_8bit
gradient_checkpointing: true
max_seq_length: 1024
logging_steps: 10
save_steps: 200
eval_steps: 200
save_total_limit: 2
dataloader_num_workers: 2
report_to: none
benchmark:
  torch_dtype: float16
  device_map: cuda:0
  load_in_8bit: true
  load_in_4bit: false
  enable_thinking: false
  max_new_tokens: 128
  temperature: 0.0
  top_p: 1.0
  batch_size: 4
